      <stop offset="0" stop-color="#fff8ec" />
      <stop offset="0.5" stop-color="#f4d6a8" />
      <stop offset="1" stop-color="#d7f0eb" />
    </linearGradient>
    <radialGradient id="accentA" cx="20%" cy="12%" r="60%">
      <stop offset="0" stop-color="#f4a261" stop-opacity="0.8" />
      <stop offset="1" stop-color="#f4a261" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="accentB" cx="92%" cy="86%" r="64%">
      <stop offset="0" stop-color="#2a9d8f" stop-opacity="0.64" />
