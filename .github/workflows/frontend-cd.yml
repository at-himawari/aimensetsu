name: Frontend CD

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_AUTH_MODE: ${{ vars.VITE_AUTH_MODE }}
      VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
      VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
      VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
      VITE_COGNITO_REDIRECT_URI: ${{ vars.VITE_COGNITO_REDIRECT_URI }}
      VITE_COGNITO_LOGOUT_URI: ${{ vars.VITE_COGNITO_LOGOUT_URI }}
      VITE_COGNITO_SCOPES: ${{ vars.VITE_COGNITO_SCOPES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Check production frontend environment
        run: |
          test "$VITE_AUTH_MODE" = "cognito" || {
            echo "VITE_AUTH_MODE must be set to cognito in GitHub Actions variables."
            exit 1
          }
          test -n "$VITE_API_BASE_URL" || {
            echo "VITE_API_BASE_URL is not set in GitHub Actions variables."
            exit 1
          }
          test -n "$VITE_COGNITO_REGION" || {
            echo "VITE_COGNITO_REGION is not set in GitHub Actions variables."
            exit 1
          }
          test -n "$VITE_COGNITO_CLIENT_ID" || {
            echo "VITE_COGNITO_CLIENT_ID is not set in GitHub Actions variables."
            exit 1
          }

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx --yes wrangler@4.91.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
